body:
  text: 徑與邊亦俱北左右距四十五度按表綴星恰與天象脗合矣甞考前法以人目在球外視北極之半天星座愈近赤道者其光相叅直竟模糊莫辨是圖之製以極至赤道九十廣面補成直角之方面星與星之相距不更綽然臚列井井陳獻乎今以北京試認本地北極出地四十度以是圖北極一靣視之環極四十五度之星終歲恒見挨對認不勞餘力若見南極出地者視是圖之南極一面理俱同首方一面太陽躔戍官係春分此面是畫之天象要認星可用于秋之三月當夜恒見之天象第二面太陽躔未官係夏至此靣可用于冬之三月當夜所恒見之天象第三面太陽躔辰官係秋分此面可用于春之三月當夜所恒見之天象第四面太陽躔丑宮係冬至此面可用于夏至三月當夜所恒見之天象凡認得一星欲考其何經何緯度臬星查徑與邊所分之度卽得何經何緯廣也如求某星出入地平和太陽躔其宮度某星距黃道若干度知太陽之出沒以星之距度或先或後并可得某星出沒地平之時矣七政曆載太陽躔度民曆載太陽出沒是圖之専用開列于後一等星十六個二等星六十八個三等星二百零八個四等星五百一十三個五等星三百三十九個六等星七百二十一個氣十一座共星一千八百七十六個康熙辛卯歲春治理曆法極西閔明我製
