body:
  text: 查認星之總歸三條第一條查其星經度第二條查某星緯度第三條查兩星相距度數丸認得一星欲考其何經何緯故列減便之法特繪經緯全線方圖并兩極全線圓圖隨意將某圖內之某星用規矩取定移校全線之圖即得此星經緯凖度倘遇兩星不同經緯欲考其相距度數必依象限圖式用規矩取定按甲乙丙等字為法依法挨查所校象限儀之度即知此二星相距凖度也凡查考過天諸星相距之度如此用法不勞餘力即時瞭然於心目矣并列比如成法于左一查北極圖內上弼與右樞此二星雖同緯度圈線自極心取象限儀中兩直線至邊度用甲乙字號比例相距十八度四十分即得凖度分也二查北極圖第三星雖同經度直線須用規矩自極取各星圈線比至中心度相距十三度八分即得凖度分也三查北極圖內玉衡與搖光此二星經緯俱不同故用規矩自極中校取搖光之遠移至中度下從此橫比邊度定號為甲自甲至極中取一自然直線隨得度邊虛圓小線再取玉衡之遠亦照前法所求先取虛圓小線為乙次校二是之遠近從甲斜比度格之外為丙自丙至極中又取自然直線用張規矩比校甲丙二線之中所經象限儀之度即得二星相距十度二十分之凖度分也倘認象限儀中度數不明隨移校邊度更易明矣凡同緯度不同經度之星即上弼右樞二星亦照前法所求用甲乙字號查象限儀中即得相距凖度分也
