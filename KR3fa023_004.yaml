body:
  text: 方星圖解從來符合天象而無毫髪叅錯者惟渾天儀之製爲首推也然非範金爲球斷不能中規而適用其他木球紙球最易伸縮難求其凖且需托以架座攜帶維艱不得有隨地測視之便于是創爲星圖藏之笥篋實稱輕便有爲一平圓之簡平規者有爲剖渾圓爲南北兩星圖者俱各得視學之妙蘊然簡平規以渾圓開展爲平圖以北極出地二十三度半爲限于赤道以內之星象固得盡善至赤道以外之星形與在天者究不得脗合也如南北兩圖從渾天之赤道剖分爲兩半渾圓復匾之而爲兩平圓人從南極視北或從北極視南所見之星固圖與天合然人當兩道之下視赤道之星座因分繪兩圖殊難識別矣若今方圖之製悉免前獘不變星座之形狀使學識星者按圖以窺天挨次識認不煩指示卽可瞭然于心目而週天之星名可歴歴而呼之也甞按視學論人目之能視張目出光至所視之界皆成三角形其角若在四十五度則適當其可其角若過六十度則所視亦不眞確故書家亦以四十五度爲規作畵人莫不喜其深遠而受看若越此規無不厭觀而鮮趣今是圖以渾圓爲立方按視學之理以人目居地中心設地爲六靣立方之體上下四傍各九十度皆若水晶玻璃之能透光者北極居上南極居下各以極爲心環極各四十五度直線爲經圈線爲緯徑邊俱分綴度數按表而布拱極之諸星焉赤道居四傍之腰第一面之中心係黃赤相交黃道自此漸向北爲赤道經度之始從此起筭第二面係黃道斜絡最北與夏至限緯圈相切而漸厄轉第三面之中係黃道復與赤道相交漸次向南至此卽半周天爲一百八十度第四面係黃道斜絡極南與冬至限緯圈相切而厄轉漸至第一面之中心與赤道復交至此卽全一周天爲三百六十度四
