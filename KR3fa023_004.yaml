body:
  text: 方星圖解從來符合天象而無毫髮參錯者惟渾天儀之製為首推也然非範金為球斷不能中規而適用其他木球紙球最易伸縮難求其凖且需托以架座攜帶維艱不得有隨地測視之便于是創為星圖藏之笥篋實稱輕便有為一平圓之簡平規者有為剖渾圓為南北兩星圖者俱各得視學之妙蘊然簡平規以渾圓開展為平圖以北極出地二十三度半為限于赤道以內之星象固得盡善至赤道以外之星形與在天者究不得吻合也如南北兩圖從渾天之赤道剖分為兩半渾圓復匾之而為兩平圓人從南極視北或從北極視南所見之星固圖與天合然人當兩道之下視赤道之星座因分繪兩圖殊難識別矣若今方圖之製悉免前斃不變星座之形狀使學識星者按圖以窺天挨次識認不煩指示即可瞭然于心目而周天之星名可歷歷而呼之也嘗按視學論人目之能視張目出光至所視之界皆成三角形其角若在四十五度則適當其可其角若過六十度則所視亦不真確故書家亦以四十五度為規作畫人莫不喜其深遠而受看若越此規無不厭觀而鮮趣今是圖以渾圓為立方按視學之理以人目居地中心設地為六靣立方之體上下四傍各九十度皆若水晶玻璃之能透光者北極居上南極居下各以極為心環極各四十五度直線為經圈線為緯徑邊俱分綴度數按表而布拱極之諸星焉赤道居四傍之腰第一面之中心係黃赤相交黃道自此漸向北為赤道經度之始從此起算第二面係黃道斜絡最北與夏至限緯圈相切而漸厄轉第三面之中係黃道復與赤道相交漸次向南至此即半周天為一百八十度第四面係黃道斜絡極南與冬至限緯圈相切而厄轉漸至第一面之中心與赤道復交至此即全一周天為三百六十度四
